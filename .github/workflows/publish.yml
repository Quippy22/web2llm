name: Publish to crates.io

on:
  workflow_call:
    inputs:
      crate_name:
        required: true
        type: string
    secrets:
      CRATES_IO_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  publish:
    name: Cargo Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Publish
        run: |
          for attempt in 1 2 3 4 5; do
            cargo publish -p "${{ inputs.crate_name }}" --token "${{ secrets.CRATES_IO_TOKEN }}" && exit 0
            echo "publish attempt ${attempt} for ${{ inputs.crate_name }} failed"
            sleep 30
          done
          exit 1
