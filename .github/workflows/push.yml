name: CI

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Check, Test, and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to resolve all tags

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Verify publishable packages
        run: |
          cargo package -p web2llm --allow-dirty
          cargo package -p web2llm-cli --allow-dirty

  detect_web2llm:
    name: Detect web2llm Release
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect web2llm version state
        id: detect
        run: |
          VERSION=$(grep '^version' crates/web2llm/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          TAG="web2llm-v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list | grep -q "^${TAG}$"; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  detect_web2llm_cli:
    name: Detect web2llm-cli Release
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect web2llm-cli version state
        id: detect
        run: |
          VERSION=$(grep '^version' crates/web2llm-cli/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          TAG="web2llm-cli-v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list | grep -q "^${TAG}$"; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish_web2llm:
    name: Publish web2llm
    needs:
      - ci
      - detect_web2llm
    if: |
      needs.ci.result == 'success' &&
      needs.detect_web2llm.outputs.should_publish == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      crate_name: web2llm
    secrets:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  release_web2llm:
    name: Release web2llm
    needs:
      - detect_web2llm
      - publish_web2llm
    if: |
      needs.publish_web2llm.result == 'success'
    uses: ./.github/workflows/release.yml
    with:
      crate_name: web2llm
      version: ${{ needs.detect_web2llm.outputs.version }}
    permissions:
      contents: write

  publish_web2llm_cli:
    name: Publish web2llm-cli
    needs:
      - ci
      - detect_web2llm_cli
      - publish_web2llm
    if: |
      always() &&
      needs.ci.result == 'success' &&
      needs.detect_web2llm_cli.outputs.should_publish == 'true' &&
      (needs.publish_web2llm.result == 'success' || needs.publish_web2llm.result == 'skipped')
    uses: ./.github/workflows/publish.yml
    with:
      crate_name: web2llm-cli
    secrets:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  release_web2llm_cli:
    name: Release web2llm-cli
    needs:
      - detect_web2llm_cli
      - publish_web2llm_cli
    if: |
      needs.publish_web2llm_cli.result == 'success'
    uses: ./.github/workflows/release.yml
    with:
      crate_name: web2llm-cli
      version: ${{ needs.detect_web2llm_cli.outputs.version }}
    permissions:
      contents: write
