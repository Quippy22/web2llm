name: CI

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Check, Test, and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Verify publishable packages
        run: |
          cargo package -p web2llm --allow-dirty
          cargo package -p web2llm-cli --allow-dirty

  detect_web2llm:
    name: Detect web2llm State
    needs: ci
    uses: ./.github/workflows/detect-release-state.yml
    with:
      crate_name: web2llm
      manifest_path: crates/web2llm/Cargo.toml
      legacy_tag_prefix: v

  release_web2llm:
    name: Release web2llm
    needs:
      - detect_web2llm
    if: needs.detect_web2llm.outputs.release_needed == 'true'
    uses: ./.github/workflows/release.yml
    with:
      crate_name: web2llm
      version: ${{ needs.detect_web2llm.outputs.version }}
    permissions:
      contents: write

  publish_web2llm:
    name: Publish web2llm
    needs:
      - detect_web2llm
      - release_web2llm
    if: |
      needs.detect_web2llm.outputs.publish_needed == 'true' &&
      (needs.release_web2llm.result == 'success' || needs.release_web2llm.result == 'skipped')
    uses: ./.github/workflows/publish.yml
    with:
      crate_name: web2llm
    secrets:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  detect_web2llm_cli:
    name: Detect web2llm-cli State
    needs: ci
    uses: ./.github/workflows/detect-release-state.yml
    with:
      crate_name: web2llm-cli
      manifest_path: crates/web2llm-cli/Cargo.toml

  release_web2llm_cli:
    name: Release web2llm-cli
    needs:
      - detect_web2llm_cli
    if: needs.detect_web2llm_cli.outputs.release_needed == 'true'
    uses: ./.github/workflows/release.yml
    with:
      crate_name: web2llm-cli
      version: ${{ needs.detect_web2llm_cli.outputs.version }}
    permissions:
      contents: write

  publish_web2llm_cli:
    name: Publish web2llm-cli
    needs:
      - detect_web2llm_cli
      - release_web2llm_cli
    if: |
      needs.detect_web2llm_cli.outputs.publish_needed == 'true' &&
      (needs.release_web2llm_cli.result == 'success' || needs.release_web2llm_cli.result == 'skipped')
    uses: ./.github/workflows/publish.yml
    with:
      crate_name: web2llm-cli
    secrets:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
