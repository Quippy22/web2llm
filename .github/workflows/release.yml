name: Release

on:
  workflow_call:
    inputs:
      crate_name:
        required: true
        type: string
      version:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to parse all commits since last tag

      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="${{ inputs.crate_name }}-v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate release notes
        id: notes
        run: |
          case "${{ inputs.crate_name }}" in
            web2llm)
              PATHS=("crates/web2llm" "Cargo.toml" "Cargo.lock" "README.md" ".github/workflows")
              ;;
            web2llm-cli)
              PATHS=("crates/web2llm-cli" "Cargo.toml" "Cargo.lock" "README.md" ".github/workflows")
              ;;
            *)
              PATHS=("crates/${{ inputs.crate_name }}")
              ;;
          esac

          PREV_TAG=$(git tag --list "${{ inputs.crate_name }}-v*" --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          FEATURES=""
          FIXES=""
          REFACTORS=""
          TESTS=""
          DOCS=""
          BUILD=""
          OTHER=""

          mapfile -t COMMITS < <(git log --pretty=format:"%s" "$RANGE" -- "${PATHS[@]}")

          for commit in "${COMMITS[@]}"; do
            PREFIX=$(echo "$commit" | grep -oP '^[a-z-]+(?=:)' || echo "")
            VERB=$(echo "$commit" | grep -oP '(?<=:\s)[a-z]+' || echo "")
            MESSAGE=$(echo "$commit" | grep -oP '(?<=:\s).+' || echo "")

            [ -z "$MESSAGE" ] && MESSAGE="$commit"

            case "$PREFIX" in
              release) continue ;;
              docs)    DOCS="$DOCS\n- $MESSAGE"; continue ;;
              test)    TESTS="$TESTS\n- $MESSAGE"; continue ;;
              build)   BUILD="$BUILD\n- $MESSAGE"; continue ;;
            esac

            case "$VERB" in
              add)      FEATURES="$FEATURES\n- $MESSAGE" ;;
              fix)      FIXES="$FIXES\n- $MESSAGE" ;;
              refactor) REFACTORS="$REFACTORS\n- $MESSAGE" ;;
              docs)     DOCS="$DOCS\n- $MESSAGE" ;;
              build)    BUILD="$BUILD\n- $MESSAGE" ;;
              test)     TESTS="$TESTS\n- $MESSAGE" ;;
              *)        OTHER="$OTHER\n- $MESSAGE" ;;
            esac
          done

          # build the release body, sections only appear if they have content
          BODY="# ${{ inputs.crate_name }} v${{ inputs.version }}\n"
          [ -n "$FEATURES" ]  && BODY="$BODY\n## 🚀 Features\n$FEATURES\n"
          [ -n "$FIXES" ]     && BODY="$BODY\n## 🐛 Fixes\n$FIXES\n"
          [ -n "$REFACTORS" ] && BODY="$BODY\n## ♻️ Refactors\n$REFACTORS\n"
          [ -n "$TESTS" ]     && BODY="$BODY\n## 🧪 Tests\n$TESTS\n"
          [ -n "$DOCS" ]      && BODY="$BODY\n## 📚 Docs\n$DOCS\n"
          [ -n "$BUILD" ]     && BODY="$BODY\n## 🔧 Build\n$BUILD\n"
          [ -n "$OTHER" ]     && BODY="$BODY\n## 📦 Other\n$OTHER\n"
          if [ "$BODY" = "# ${{ inputs.crate_name }} v${{ inputs.version }}\n" ]; then
            BODY="$BODY\n- Release ${{ inputs.crate_name }} v${{ inputs.version }}\n"
          fi

          # write to file to avoid quoting issues
          printf "$BODY" > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.crate_name }}-v${{ inputs.version }}
          name: ${{ inputs.crate_name }} v${{ inputs.version }}
          body_path: release_notes.md
          prerelease: ${{ startsWith(inputs.version, '0.0.') }}
